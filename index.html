<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ハナハナカウンター</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a; --cell-bg: #444444; --grid-line: #111111;
            --text-white: #ffffff; --lamp-blue: #33aaff; --lamp-yellow: #ffdd44;
            --lamp-green: #44ff44; --lamp-red: #ff4444; --lamp-purple: #d044ff; --lamp-white: #dddddd;
            --active-btn: #007aff;
        }
        
        /* メイン部分のスクロール完全無効化とダブルタップ拡大無効化 */
        html, body {
            background: var(--bg-color); color: var(--text-white);
            font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100%;
            user-select: none; -webkit-user-select: none; 
            touch-action: none; overflow: hidden;
        }

        .container { 
            padding: 5px 10px 80px; width: 100%; height: calc(100vh - 48px);
            box-sizing: border-box; overflow: hidden; touch-action: none;
        }

        .rainbow {
            background: linear-gradient(to right, #ff3333, #ffff33, #33ff33, #33ffff, #3333ff, #ff33ff, #ff3333);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; font-weight: bold; animation: rainbow_move 3s linear infinite;
        }
        @keyframes rainbow_move { to { background-position: 200% center; } }
        
        .rainbow-char {
            background: linear-gradient(to right, #ff3333, #ffff33, #33ff33, #33ffff, #3333ff, #ff33ff);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; font-weight: bold;
            display: inline-block;
        }
        
        .rainbow-img {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: middle;
            background-image: url('gif画像');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .rainbow-icon {
            height: 1.1em;
            vertical-align: -0.2em; 
            display: inline-block;
        }
        
        /* ヘッダー */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 16px; background: #000; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid #333; height: 40px; box-sizing: border-box;
        }
        /* アイコンの大きさを元に戻しつつ、パディングで当たり判定をタブの高さ(48px)限界まで拡大 */
        .header-icon { 
            font-size: 20px; cursor: pointer; color: white; 
            padding: 10px 20px; margin: -10px -20px;
            display: inline-flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        /* 機種名の大きさを元に戻す */
        .header-title { font-size: 14px; font-weight: bold; border-bottom: 2px solid white; }
        
        /* レイアウト */
        .main-layout { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .col-left, .col-right { display: flex; flex-direction: column; width: 100%; }
        
        @media (orientation: landscape) {
            .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
        }

        .section-title { text-align: center; margin: 6px 0 2px; font-size: 11px; font-weight: bold; }
        .grid { display: grid; gap: 1px; background: var(--grid-line); border: 1px solid var(--grid-line); margin-bottom: 5px; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-5 { grid-template-columns: repeat(5, 1fr); }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        
        .cell { background: var(--cell-bg); padding: 2px 2px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 30px; }
        .label { font-size: 9px; color: white; margin-bottom: 1px; pointer-events: none; }
        .value { font-size: 16px; font-weight: bold; line-height: 1.2; pointer-events: none; }
        .touch-active { background: #55aaff !important; }
        .minus-mode { background: #900 !important; }
        .selected-lamp { border: 2px solid #fff; background: #666; }
        .active-mode { background: var(--active-btn) !important; color: white; }
        
        /* 入力フォーム関連のスタイル */
        .val-input { width: 100%; background: transparent; color: white; border: none; text-align: center; font-size: 16px; font-weight: bold; outline: none; }
        /* メイン画面の数値入力枠のみブラウザ自動余白を無効化 */
        .cell input.val-input { padding: 0; margin: 0; height: 100%; line-height: 1.2; border-radius: 0; -webkit-appearance: none; box-sizing: border-box; }
        
        .label-large { font-size: 16px !important; font-weight: bold; color: white; margin-bottom: 0; pointer-events: none; }

        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; flex-direction: column; }
        .modal.active { display: flex; }
        /* モーダルのヘッダーをメインタブと完全に同じサイズに統一 */
        .modal-header { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #000; border-bottom: 1px solid #333; height: 40px; box-sizing: border-box; }
        /* モーダル内のみスクロール許可 */
        .modal-body { flex: 1 1 auto; overflow-y: auto; padding: 10px 15px 60vh; touch-action: pan-y; }

        .expect-box { background: #222; padding: 5px 10px; border: 1px solid #444; margin-bottom: 10px; }
        .expect-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 2px; }
        .expect-val { font-weight: bold; } 

        /* 詳細データのレイアウト固定化 (ダブルタップ時の項目ズレを完全に防止) */
        .detail-table { width: 100%; border-collapse: collapse; font-size: 12px; color: white; table-layout: fixed; }
        .detail-table th { width: 55%; background: #222; text-align: left; padding: 6px 4px; border-bottom: 1px solid #444; font-weight: normal; word-wrap: break-word; }
        .detail-table td { width: 45%; padding: 6px 4px; border-bottom: 1px solid #444; text-align: right; font-weight: bold; cursor: pointer; word-wrap: break-word; }

        @media (orientation: landscape) {
            .modal-body { padding: 10px 15px 60vh; }
            .modal-body .section-title { margin: 6px 0 2px; font-size: 11px; }
            .bar-row { margin: 6px 0; font-size: 13px; }
            .bar-bg { height: 10px; }
            .expect-box { padding: 5px 10px; margin-bottom: 10px; }
            .expect-row { font-size: 13px; margin-bottom: 2px; }
        }

        /* グラフのスタイル分け（総合推測は元サイズ、個別推測のみ広げる） */
        .bar-row { display: flex; align-items: center; margin: 6px 0; font-size: 13px; color: white; }
        .bar-label { width: 40px; text-align: left; line-height: 1.2; flex-shrink: 0; }
        .sub-graph-row .bar-label { width: 100px; }
        .bar-bg { flex: 1; height: 10px; background: #333; margin: 0 8px; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: #fff; width: 0%; transition: width 0.3s; }
        .bar-val { width: 55px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }

        .sub-graph-row { display: none; background: #111; }
        .sub-graph-row.open { display: table-row; }
        .white-txt { color: #fff !important; font-weight: normal; }
        .export-btn { width: 100%; padding: 15px; background: #000; color: #0ff; border: 1px solid #0ff; margin-top: 10px; font-weight: bold; }
        
        select { color: white; }

        #img-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:300; flex-direction:column; align-items:center; justify-content:center; }
        #img-preview { max-width: 90%; max-height: 80%; border: 1px solid #555; margin-bottom: 10px; }
        #img-controls { display: flex; gap: 20px; }
        
        #capture-target {
            position: fixed; top: 0; left: 0; z-index: -9999;
            width: 400px; background: #1a1a1a; color: white; padding: 20px;
            font-family: -apple-system, sans-serif;
            visibility: visible; 
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon" onclick="openModal('predict-modal')">🔍</div>
    <div class="header-title" id="disp-machine">---</div>
    <div class="header-icon" onclick="openModal('setting-modal')">⚙️</div>
</div>

<div class="container">
    <div id="main-ui"></div>
</div>

<div id="setting-modal" class="modal">
    <div class="modal-header">
        <div class="header-icon" style="visibility:hidden; pointer-events:none;">✕</div>
        <div style="font-weight:bold; color:white;">設定</div>
        <div class="header-icon" onclick="closeModal('setting-modal')">✕</div>
    </div>
    <div class="modal-body">
        <p class="section-title">＜機種選択＞</p>
        <div class="grid">
            <select class="val-input" style="background:#333; padding:5px;" id="machine-select" onchange="updateMachine()">
                <option value="houou">ハナハナホウオウ～天翔～</option>
                <option value="king">キングハナハナ</option>
                <option value="dragon">ドラゴンハナハナ～閃光～</option>
                <option value="star">スターハナハナ</option>
                <option value="newking">ニューキングハナハナⅤ</option>
            </select>
        </div>
        <p class="section-title">＜表示・出力データ＞</p>
        <div class="grid grid-2">
            <div class="cell" id="btn-view-personal" onclick="setViewMode('personal')"><div class="label-large">個人</div></div>
            <div class="cell" id="btn-view-total" onclick="setViewMode('total')"><div class="label-large">全て</div></div>
        </div>
        <p class="section-title">＜入力モード＞</p>
        <div class="grid grid-2">
            <div class="cell" id="btn-mode-tap" onclick="setInputMode('tap')"><div class="label-large">タップ</div></div>
            <div class="cell" id="btn-mode-input" onclick="setInputMode('input')"><div class="label-large">入力</div></div>
        </div>
        <p class="section-title">＜打ち始めデータ＞</p>
        <div class="grid grid-3">
            <div class="cell"><div class="label">ゲーム数</div><input type="number" class="val-input" id="start-g" onchange="saveStart()" onfocus="this.select()"></div>
            <div class="cell"><div class="label">BIG</div><input type="number" class="val-input" id="start-b" onchange="saveStart()" onfocus="this.select()"></div>
            <div class="cell"><div class="label">REG</div><input type="number" class="val-input" id="start-r" onchange="saveStart()" onfocus="this.select()"></div>
        </div>
        <p class="section-title">＜BIG：筐体ランプ(朝一)＞</p>
        <div class="grid grid-5" id="morning-lamp-selector"></div>
        
        <p class="section-title" style="margin-top:15px; color:white;">＜設定推測：要素調整＞</p>
        <div class="grid grid-3" id="weight-settings"></div>

        <button onclick="exportData()" class="export-btn">データコピー・画像出力</button>
        <button onclick="resetAll()" style="width:100%; padding:15px; background:transparent; color:#f44; border:1px solid #f44; margin-top:20px; font-weight:bold;">リセット</button>
    </div>
</div>

<div id="predict-modal" class="modal">
    <div class="modal-header">
        <div class="header-icon" style="visibility:hidden; pointer-events:none;">✕</div>
        <div style="font-weight:bold; color:white;">設定推測</div>
        <div class="header-icon" onclick="closeModal('predict-modal')">✕</div>
    </div>
    <div class="modal-body">
        <p class="section-title" id="title-predict">＜推測設定＞</p>
        <div id="predict-bars" style="background:#222; padding:5px 10px; border-radius:5px;"></div>
        <p class="section-title" id="title-expect">＜実践値＞</p>
        <div class="expect-box" id="expect-info"></div>
        <p class="section-title" id="title-detail">＜詳細データ＞</p>
        <table class="detail-table" id="detail-rows"></table>
    </div>
</div>

<div id="img-modal">
    <div style="color:white; margin-bottom:10px; font-weight:bold;">画像を生成しました</div>
    <img id="img-preview" src="">
    <div id="img-controls">
        <button onclick="downloadImage()" style="padding:10px 20px; background:#007aff; color:white; border:none; border-radius:5px; font-weight:bold;">画像を保存</button>
        <button onclick="document.getElementById('img-modal').style.display='none'" style="padding:10px 20px; background:#555; color:white; border:none; border-radius:5px;">閉じる</button>
    </div>
</div>

<div id="capture-target"></div>

    let data = loadData();

    function loadData() {
        try {
            const saved = localStorage.getItem('hana_v20_data');
            let d = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULTS));
            
            const machines = ['houou', 'king', 'dragon', 'star', 'newking'];
            machines.forEach(m => {
                if (!d[m]) d[m] = JSON.parse(JSON.stringify(SINGLE_DEFAULT));
            });
            if (!d.weights) {
                d.weights = JSON.parse(JSON.stringify(DEFAULTS.weights));
            } else {
                machines.forEach(m => {
                    if (!d.weights[m]) d.weights[m] = JSON.parse(JSON.stringify(DEFAULTS.weights[m]));
                });
            }
            if (!d.machine || !machines.includes(d.machine)) d.machine = 'houou';
            
            return d;
        } catch(e) { return JSON.parse(JSON.stringify(DEFAULTS)); }
    }

    // 入力枠のフォーカス消失を防ぐため、skipRenderフラグを追加
    function save(skipRender = false) { 
        localStorage.setItem('hana_v20_data', JSON.stringify(data)); 
        if(!skipRender) renderMain(); 
    }
    function getData() { return data[data.machine]; }

    function init() {
        document.getElementById('machine-select').value = data.machine || 'houou';
        syncInputs();
        renderMorningSelector();
        renderWeightSettings();
        renderMain(); 
    }

    function syncInputs() {
        const d = getData();
        document.getElementById('start-g').value = d.start.g;
        document.getElementById('start-b').value = d.start.b;
        document.getElementById('start-r').value = d.start.r;
    }

    // 0/0表記を0/分母にする、かつ桁数指定
    function getP(k, n, digits = 2) { 
        if (n <= 0) return "0/0";
        if (k <= 0) return `0/${Math.round(n)}`; 
        return `1/${(n/k).toFixed(digits)}`; 
    }

    function renderMorningSelector() {
        const pm = ALL_PARAMS[data.machine];
        const d = getData();
        const labs = ['白', ...pm.labels.slice(0,4)];
        const cols = ['var(--lamp-white)', ...pm.colors.slice(0,4)];
        let html = '';
        labs.forEach((l, i) => {
            const isSel = (d.morning === i) ? 'selected-lamp' : '';
            const colStyle = cols[i] === 'rainbow' ? 'class="rainbow"' : `style="color:${cols[i].startsWith('var')?cols[i]:'var('+cols[i]+')'}"`;
            html += `<div class="cell ${isSel}" onclick="setMorning(${i})"><div class="label-large" ${colStyle}>${l}</div></div>`;
        });
        document.getElementById('morning-lamp-selector').innerHTML = html;
    }
    
    function setMorning(val) { 
        getData().morning = (getData().morning === val) ? -1 : val; 
        save(); renderMorningSelector(); 
    }

    function renderWeightSettings() {
        const w = data.weights[data.machine];
        const isNew = data.machine === 'newking';
        const pm = ALL_PARAMS[data.machine];
        const labels = pm.w_labels;
        
        let html = `
            ${mkW(labels.b, 'b', w.b)}
            ${mkW(labels.r, 'r', w.r)}
            ${mkW(labels.gas, 'gas', w.gas)}
            ${mkW(labels.bell, 'bell', w.bell)}
            ${mkW(labels.sui, 'sui', w.sui)}
            ${isNew ? mkW(labels.suiR, 'suiR', w.suiR) : '<div style="background: var(--bg-color);"></div>'}
            ${mkW(labels.sl, 'sl', w.sl)}
            ${mkW(labels.morn, 'morn', w.morn)}
            ${mkW(labels.bl, 'bl', w.bl)}
            ${mkW(labels.rl, 'rl', w.rl)}
            ${mkW(labels.ret, 'ret', w.ret)}
        `;
        document.getElementById('weight-settings').innerHTML = html;
    }
    function mkW(label, key, val) {
        return `<div class="cell"><div class="label">${label}</div><div style="display:flex; justify-content:center; align-items:baseline; width:100%;"><input type="number" class="val-input weight-input" style="width:40px; text-align:right; padding-right:2px;" data-key="${key}" value="${val}" onchange="saveWeight(this)" onfocus="this.select()"><span style="color:white; font-size:14px; font-weight:bold;">％</span></div></div>`;
    }
    function saveWeight(el) {
        const key = el.dataset.key;
        let val = Number(el.value);
        if(val < 0) val = 0;
        data.weights[data.machine][key] = val;
        save();
    }

    function setViewMode(m) { data.viewMode = m; save(); updateHeader(); }
    function setInputMode(m) { data.mode = m; save(); updateHeader(); }
    function updateMachine() { 
        data.machine = document.getElementById('machine-select').value; 
        syncInputs();
        save(); updateHeader(); renderMorningSelector(); renderWeightSettings();
    }
    
    function saveStart() {
        const d = getData();
        const old_sg = d.start.g || 0;
        const old_sb = d.start.b || 0;
        const old_sr = d.start.r || 0;

        d.start.g = Number(document.getElementById('start-g').value) || 0;
        d.start.b = Number(document.getElementById('start-b').value) || 0;
        d.start.r = Number(document.getElementById('start-r').value) || 0;
        
        d.cur.g = Math.max(0, d.cur.g + (d.start.g - old_sg));
        d.cur.b = Math.max(0, d.cur.b + (d.start.b - old_sb));
        d.cur.r = Math.max(0, d.cur.r + (d.start.r - old_sr));
        
        save();
    }

    function renderMain() {
        const d = getData();
        const c = d.cur; const s = d.start;
        const vG = c.g; const vB = c.b; const vR = c.r;
        const isNew = data.machine === 'newking';

        if (data.machine === 'newking') {

    function attachEvents() {
        document.querySelectorAll('.cell.t-btn, .cell.t-lamp').forEach(el => {
            let sy, sx, isC, minusTimer, visualTimer;
            
            const handleStart = (y, x) => {
                sy = y; sx = x; isC = false;
                
                // ① 水色への変化を「70ミリ秒」遅らせる（スクロール時の誤発光防止）
                visualTimer = setTimeout(() => { 
                    if(!isC) el.classList.add('touch-active'); 
                }, 70);
                
                // ② 赤色（マイナス）への変化時間を「300ミリ秒」に短縮（※さらに短くしたい場合はここを変更）
                minusTimer = setTimeout(() => { 
                    if(!isC) el.classList.add('minus-mode'); 
                }, 300);
            };
            
            const handleMove = (y, x) => {
                // 指が50px以上ズレたらスクロールとみなし、タイマーを止めて色も消す
                if(Math.abs(y - sy) > 50 || Math.abs(x - sx) > 50) { 
                    isC = true; 
                    clearTimeout(visualTimer); 
                    clearTimeout(minusTimer); 
                    el.classList.remove('touch-active', 'minus-mode'); 
                }
            };
            
            const handleEnd = () => {
                clearTimeout(visualTimer);
                clearTimeout(minusTimer);
                if(isC) return; // スクロールキャンセルされていれば終了
                
                const isMinus = el.classList.contains('minus-mode');
                const step = (isMinus ? -1 : 1) * Number(el.dataset.step || 1);
                const d = getData();
                
                let newVal = 0;
                if(el.dataset.id) {
                    d.cur[el.dataset.id] = Math.max(0, d.cur[el.dataset.id] + step);
                    newVal = d.cur[el.dataset.id];
                } else {
                    d.lamps[el.dataset.type][el.dataset.idx] = Math.max(0, d.lamps[el.dataset.type][el.dataset.idx] + step);
                    newVal = d.lamps[el.dataset.type][el.dataset.idx];
                }
                
                el.querySelector('.value').innerText = newVal;
                
                // ③ 超高速タップ（70ms未満）でも「押した感」を出すためのフラッシュ演出
                if(!isMinus) {
                    el.classList.add('touch-active');
                    setTimeout(() => el.classList.remove('touch-active'), 100);
                } else {
                    el.classList.remove('touch-active', 'minus-mode');
                }
                
                save(true);
                try { setTimeout(calc, 0); } catch(e) {}
            };

            const handleCancel = () => {
                isC = true; 
                clearTimeout(visualTimer);
                clearTimeout(minusTimer);
                el.classList.remove('touch-active', 'minus-mode');
            };

            // Pointer Events
            el.onpointerdown = (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                el.setPointerCapture(e.pointerId);
                handleStart(e.clientY, e.clientX);
            };
            
            el.onpointermove = (e) => {
                handleMove(e.clientY, e.clientX);
            };
            
            el.onpointerup = (e) => {
                el.releasePointerCapture(e.pointerId);
                handleEnd();
            };
            
            el.onpointercancel = () => {
                handleCancel();
            };
            
            el.oncontextmenu = (e) => e.preventDefault();
        });
    }

    function calcLikelihoodInverse(n, k, probList) {
        if(n <= 0 || k < 0) return probList.map(()=>1);
        let logs = probList.map(p => {
            const pr = 1/p;
            return k * Math.log(pr) + (n - k) * Math.log(1 - pr);
        });
        const maxLog = Math.max(...logs);
        if (maxLog === -Infinity) return probList.map(()=>1);
        return logs.map(l => Math.exp(l - maxLog));
    }

    function calcLikelihoodDirect(n, k, probList) {
        if(n <= 0 || k < 0) return probList.map(()=>1);
        let logs = probList.map(pr => {
            if(pr <= 0 || pr >= 1) return (k===0 && pr<=0) || (k===n && pr>=1) ? 0 : -Infinity;
            return k * Math.log(pr) + (n - k) * Math.log(1 - pr);
        });
        const maxLog = Math.max(...logs);
        if (maxLog === -Infinity) return probList.map(()=>1);
        return logs.map(l => Math.exp(l - maxLog));
    }
    
    function calcMultiLikelihood(counts, table) {
        if(counts.reduce((a,b)=>a+b,0) === 0) return table.map(()=>1);
        let logs = table.map(row => {
            let l = 0;
            counts.forEach((c, i) => { if(c > 0) l += c * Math.log(row[i] || 1e-10); });
            return l;
        });
        const maxLog = Math.max(...logs);
        if (maxLog === -Infinity) return table.map(()=>1);
        return logs.map(l => Math.exp(l - maxLog));
    }
    
    function calcBigLampLikelihood(bL_counts, rawProbsMatrix, totalBig) {
        let sumCounts = bL_counts.reduce((a, b) => a + b, 0);
        let whiteCount = totalBig - sumCounts;
        if (whiteCount < 0 || totalBig <= 0) return rawProbsMatrix.map(()=>1);

        let logs = rawProbsMatrix.map(rawP => {
            let actP = [];
            let failRate = 1.0;
            for (let i = 0; i < 5; i++) {
                let p = failRate * rawP[i];
                actP.push(p);
                failRate *= (1 - rawP[i]);
            }
            let whiteP = failRate;

            let l = 0;
            for (let i = 0; i < 5; i++) {
                if (bL_counts[i] > 0) l += bL_counts[i] * Math.log(actP[i] || 1e-10);
            }
            if (whiteCount > 0) l += whiteCount * Math.log(whiteP || 1e-10);
            return l;
        });

        let maxLog = Math.max(...logs);
        if (maxLog === -Infinity) return rawProbsMatrix.map(()=>1);
        return logs.map(l => Math.exp(l - maxLog));
    }

    function renderBarGraph(likes, settings, strs = null) {
        const sum = likes.reduce((a,b)=>a+b,0) || 1;
        const pcts = likes.map(v => (v/sum)*100);
        const maxPct = Math.max(...pcts) || 1;
        return pcts.map((p, i) => `
            <div class="bar-row">
                <div class="bar-label">設定${settings[i]} <span style="font-size:10px;color:#aaa">${strs?strs[i]:''}</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${(p/maxPct)*100}%"></div></div>
                <div class="bar-val">${p.toFixed(2)}%</div>
            </div>`).join('');
    }

    function calc(targetId = "") {
        const prefix = targetId ? targetId + "-" : "";
        const d = getData();
        const c = d.cur; const s = d.start;
        const pm = ALL_PARAMS[data.machine];
        const isNew = data.machine === 'newking';
        const w = data.weights[data.machine];
        const labels = pm.w_labels;
        
        const modeStr = data.viewMode === 'total' ? '(全て)' : '(個人)';
        if(document.getElementById(prefix+'title-predict')) {
            document.getElementById(prefix+'title-predict').innerText = `＜推測設定 ${modeStr}＞`;
            document.getElementById(prefix+'title-expect').innerText = `＜実践値 ${modeStr}＞`;
            document.getElementById(prefix+'title-detail').innerText = `＜詳細データ ${modeStr}＞`;
        }

        const personalG = Math.max(0, c.g - s.g);
        const personalB = Math.max(0, c.b - s.b);
        const personalR = Math.max(0, c.r - s.r);

        let calcG, calcB, calcR;
        if (data.viewMode === 'personal') {
            calcG = personalG; calcB = personalB; calcR = personalR;
        } else {
            calcG = c.g; calcB = c.b; calcR = c.r;
        }
        
        const actG = personalG;
        const actB = personalB;
        const actR = personalR;

        const totalG_disp = calcG + (calcB * pm.bigG) + (calcR * pm.regG);

        const rawB = calcLikelihoodInverse(calcG, calcB, pm.b);
        const lB = rawB.map(v => Math.pow(v, w.b / 100));

        const rawR = calcLikelihoodInverse(calcG, calcR, pm.r);
        const lR = rawR.map(v => Math.pow(v, w.r / 100));

        const rawG = calcLikelihoodInverse(calcG, calcB + calcR, pm.gassan);
        const lG = rawG.map(v => Math.pow(v, w.gas / 100));

        const rawBell = calcLikelihoodInverse(actG, c.bell, pm.bell);
        const lBell = rawBell.map(v => Math.pow(v, w.bell / 100));
        
        const rawSui = calcLikelihoodInverse(actB * pm.suikaDenom, c.suika, pm.suika);
        const lSui = rawSui.map(v => Math.pow(v, w.sui / 100)); 
        
        const rawRet = (c.retro_d > 0) ? calcLikelihoodInverse(c.retro_d, c.retro, pm.retro) : pm.settings.map(()=>1);
        const lRet = rawRet.map(v => Math.pow(v, w.ret / 100));

        let lSuiR = pm.settings.map(()=>1);
        let rawSuiR = null;
        if(isNew && c.suikaR > 0) {
            rawSuiR = calcLikelihoodInverse(actR * 10, c.suikaR, pm.suikaR);
            lSuiR = rawSuiR.map(v => Math.pow(v, w.suiR / 100));
        }

        let bigLamps = [...d.lamps.big];
        let lampCalcB = actB;

        if (d.morning >= 0 && lampCalcB > 0) {
            lampCalcB -= 1;
        }
        
        // 総合予測用のランプ計算
        const rawBigL = calcBigLampLikelihood(bigLamps, pm.lampB, lampCalcB);
        const lBigL_multi = rawBigL.map(v => Math.pow(v, w.bl / 100));
        // 個別グラフ表示用のランプ計算
        const sumBigLamps = bigLamps.reduce((a,b)=>a+b,0);
        const lBigL_indiv = calcLikelihoodInverse(lampCalcB, sumBigLamps, pm.blamp);

        const rawSidL = calcMultiLikelihood(d.lamps.regS, pm.sideR);
        const lSidL = rawSidL.map(v => Math.pow(v, w.sl / 100));

        let lRegL = pm.settings.map(()=>1);
        const t = d.lamps.regT;
        if(data.machine === 'newking') {
            if(t[3]>0) lRegL=[0,0,0,0,1];      // 紫 
            else if(t[2]>0) lRegL=[0,0,0,1,1]; // 緑
            else if(t[1]>0) lRegL=[0,0,1,1,1]; // 黄
            else if(t[0]>0) lRegL=[0,1,1,1,1]; // 青
        } else {
            if(t[4]>0) lRegL=[0,0,0,0,0,1]; else if(t[3]>0) lRegL=[0,0,0,0,1,1];
            else if(t[2]>0) lRegL=[0,0,0,1,1,1]; else if(t[1]>0) lRegL=[0,0,1,1,1,1]; else if(t[0]>0) lRegL=[0,1,1,1,1,1];
        }
        lRegL = lRegL.map(v => Math.pow(v, w.rl / 100));

        // 朝一ランプ推測
        let lMorn = pm.settings.map(()=>1);
        if (d.morning >= 1 && d.morning <= 4) { // 0(白)の場合は推測無視で等倍処理。1:青, 2:黄, 3:緑, 4:赤/紫
            let isEvenColor = (d.morning === 1 || d.morning === 3);
            let evenRate = pm.mornRate;
            let oddRate = 1 - evenRate;

            if (data.machine === 'newking') {
                lMorn = pm.settings.map((set, i) => {
                    let isEvenSetting = (i === 1 || i === 3);
                    return isEvenSetting ? (isEvenColor ? evenRate : oddRate) : (isEvenColor ? oddRate : evenRate);
                });
            } else {
                lMorn = pm.settings.map((set, i) => {
                    let isEvenSetting = (i === 1 || i === 3 || i === 5);
                    return isEvenSetting ? (isEvenColor ? evenRate : oddRate) : (isEvenColor ? oddRate : evenRate);
                });
            }
            lMorn = lMorn.map(v => Math.pow(v, w.morn / 100));
        }

        const totalL = lB.map((v, i) => v * lR[i] * lBell[i] * lSui[i] * lSuiR[i] * lRet[i] * lBigL_multi[i] * lSidL[i] * lRegL[i] * lMorn[i]);
        document.getElementById(prefix+'predict-bars').innerHTML = renderBarGraph(totalL, pm.settings);

        const sumL = totalL.reduce((a,b)=>a+b,0) || 1;
        const pcts = totalL.map(v => v/sumL);
        
        let bestIdx = 0;
        let maxPct = -1;
        pcts.forEach((p, i) => { if(p > maxPct) { maxPct = p; bestIdx = i; } });

        // --- 期待機械割・期待獲得枚数のノイズ除去（トップの1/10未満の設定を除外して再計算） ---
        let threshold = maxPct / 10;
        let validPcts = pcts.map(p => p >= threshold ? p : 0);
        let validSum = validPcts.reduce((a,b) => a+b, 0);
        let normPcts = validSum > 0 ? validPcts.map(p => p / validSum) : pcts;

        let highSetRate = 0;
        pm.highSetRateIdx.forEach(idx => {
            highSetRate += pcts[idx];
        });

        const expRate = normPcts.reduce((a, b, i) => a + (b * pm.payout[i]), 0);
        const diff = (calcG * 3) * (expRate/100 - 1);

        let usedBell = c.bell;
        if (personalG >= 500 && c.bell === 0) {
            usedBell = personalG / pm.bell[bestIdx];
        }
        if (data.viewMode === 'total' && s.g > 0) {
            usedBell += (s.g / pm.bell[bestIdx]);
        }

        let diffReal = pm.calcDiffReal(calcB, calcR, usedBell, calcG);

        let diffRealColor = '#0f0';
        if (Math.round(diffReal) < 0) diffRealColor = '#ff4444';
        else if (Math.round(diffReal) === 0) diffRealColor = '#ffffff';

        let colorStyle = '#0f0';
        if (expRate < 100) colorStyle = '#ff4444'; 
        else if (Math.abs(expRate - 100) < 0.01 && Math.round(diff) === 0) colorStyle = '#ffffff';

        document.getElementById(prefix+'expect-info').innerHTML = `
            <div class="expect-row"><div>総回転数</div><div class="expect-val" style="color:#fff">${totalG_disp} G</div></div>
            <div class="expect-row" style="margin-bottom:8px;"><div>現在獲得枚数</div><div class="expect-val" style="color:${diffRealColor}">${Math.round(diffReal) > 0 ? '+' : ''}${Math.round(diffReal)} 枚</div></div>
            <div class="expect-row"><div>高設定(4以上)期待度</div><div class="expect-val" style="color:${highSetRate >= 0.5 ? '#0f0' : '#fff'}">${(highSetRate*100).toFixed(2)}%</div></div>
            <div class="expect-row"><div>期待機械割</div><div class="expect-val" style="color:${colorStyle}">${expRate.toFixed(2)}%</div></div>
            <div class="expect-row"><div>期待獲得枚数</div><div class="expect-val" style="color:${colorStyle}">${diff >= 0 ? '+' : ''}${Math.round(diff)} 枚</div></div>
        `;

        let rows = [
            { id:'g', lab:'通常時回転数', val:`${calcG}回転`, l:null, str:null },
            { id:'b', lab: labels.b, val:`${calcB}回 <span class="white-txt">(${getP(calcB, calcG, 2)})</span>`, l:rawB, str:pm.b_str },
            { id:'r', lab: labels.r, val:`${calcR}回 <span class="white-txt">(${getP(calcR, calcG, 2)})</span>`, l:rawR, str:pm.r_str },
            { id:'gas', lab: labels.gas, val:`${calcB+calcR}回 <span class="white-txt">(${getP(calcB+calcR, calcG, 2)})</span>`, l:rawG, str:pm.gas_str },
            { id:'bel', lab: labels.bell, val:`${c.bell}回 <span class="white-txt">(${getP(c.bell, actG, 3)})</span>`, l:rawBell, str:pm.bell_str },
            { id:'sui', lab: labels.sui, val:`${c.suika}回 <span class="white-txt">(${getP(c.suika, actB * pm.suikaDenom, 2)})</span>`, l:rawSui, str:pm.suika_str }
        ];
        
        if(isNew) rows.push({ id:'suiR', lab: labels.suiR, val:`${c.suikaR}回 <span class="white-txt">(${getP(c.suikaR, actR * 10, 2)})</span>`, l:rawSuiR, str:pm.suikaR_str });

        rows.push({ id:'sl', lab: labels.sl, val:mkLmpT(d.lamps.regS, pm, 'regS'), l:rawSidL, str:null, hasColors: true });
        
        let sideCols = isNew ? pm.colors_side : pm.colors;
        let sideLabs = isNew ? pm.labels_side : pm.labels;
        let totalSide = d.lamps.regS.reduce((a,b)=>a+b,0);
        sideLabs.forEach((lab, i) => {
            if (!sideCols[i]) return;
            let c_v = d.lamps.regS[i];
            let c_l = calcLikelihoodDirect(totalSide, c_v, pm.sideR.map(arr => arr[i]));
            let pct = totalSide > 0 ? ((c_v / totalSide)*100).toFixed(2) : "0.00";
            let cName = sideCols[i] === 'rainbow' ? lab : `<span style="color:var(${sideCols[i]})">${lab}</span>`;
            rows.push({
                id: `sl-c${i}`,
                lab: `　${labels.sl}（${cName}）`,
                val: `${c_v}回 <span class="white-txt">(${pct}%)</span>`,
                l: c_l,
                str: pm.sideR_str[i],
                isColorRow: true,
                parent: 'sl'
            });
        });

        rows.push({ id:'bl', lab: labels.bl, val:mkLmpT(bigLamps, pm, 'big'), l:lBigL_indiv, str:pm.blamp_str, hasColors: true });
        
        pm.labels.forEach((lab, i) => {
            let c_v = bigLamps[i];
            let c_l = calcLikelihoodDirect(lampCalcB, c_v, pm.lampB.map(arr => arr[i]));
            let cName = pm.colors[i] === 'rainbow' ? lab : `<span style="color:var(${pm.colors[i]})">${lab}</span>`;
            rows.push({
                id: `bl-c${i}`,
                lab: `　${labels.bl}（${cName}）`,
                val: `${c_v}回 <span class="white-txt">(${getP(c_v, lampCalcB, 2)})</span>`,
                l: c_l,
                str: pm.lampB_str[i],
                isColorRow: true,
                parent: 'bl'
            });
        });

        rows.push({ id:'rl', lab: labels.rl, val:mkLmpT(d.lamps.regT, pm, 'regT'), l:null, str:null });
        rows.push({ id:'ret', lab: labels.ret, val:`${c.retro}回 <span class="white-txt">(${c.retro}/${c.retro_d})</span>`, l:rawRet, str:pm.retro_str });

        const container = document.getElementById(prefix+'detail-rows');
        
        let htmlRows = '';
        rows.forEach((r, i) => {
            let hasGraph = r.l !== null && r.l !== undefined;
            
            if (r.isColorRow) {
                let tapEvt = hasGraph ? `onclick="toggleGraph('g-${r.id}')"` : `onclick="event.stopPropagation();"`;
                htmlRows += `<tr class="${r.parent}-colors" style="display:none;" ${tapEvt}>
                                <th>${r.lab}</th><td>${r.val}</td>
                             </tr>`;
            } else {
                let tapEvt = '';
                if (r.hasColors) {
                    // 長押し用イベントと、単発タップ用(onclick)を綺麗に分離
                    tapEvt = `onclick="handleTap('${r.id}', ${hasGraph})" ontouchstart="startPress('${r.id}')" ontouchend="cancelPress()" ontouchmove="cancelPress()" onmousedown="startPress('${r.id}')" onmouseup="cancelPress()" onmouseleave="cancelPress()" oncontextmenu="event.preventDefault();"`;
                } else if (hasGraph) {
                    tapEvt = `onclick="toggleGraph('g-${r.id}')"`;
                } else {
                    tapEvt = `onclick="event.stopPropagation();"`;
                }
                htmlRows += `<tr id="row-${r.id}" ${tapEvt}><th>${r.lab}</th><td>${r.val}</td></tr>`;
            }
            
            if (hasGraph) {
                let gId = `g-${r.id}`;
                let graphHtml = `<tr id="${gId}" class="sub-graph-row"><td colspan="2" style="padding:0;"><div style="padding: 0px 5px 2px 5px;"><p style="font-size:10px;color:#aaa;margin:2px 0;">▼個別設定推測</p>${renderBarGraph(r.l, pm.settings, r.str)}</div></td></tr>`;
                htmlRows += graphHtml;
            }
        });
        
        container.innerHTML = htmlRows;
    }

    function mkLmpT(arr, pm, type) {
        let cols = pm.colors;
        let labs = pm.labels;
        if (data.machine === 'newking') {
            if (type === 'regS') { cols = pm.colors_side; labs = pm.labels_side; }
            else if (type === 'regT') { cols = pm.colors_regT; labs = pm.labels_regT; }
        }
        const d = getData();

        return arr.map((v,i) => {
            if(!cols[i]) return ""; 
            const col = cols[i]; const lab = labs[i];
            const s = col==='rainbow'?'class="rainbow"':`style="color:var(${col})"`;
            let vStr = v;
            if (type === 'big' && i === (d.morning - 1)) {
                vStr = `<u>${v}</u>`;
            }
            return `<span ${s}>${lab}</span>:${vStr}`;
        }).join(' ');
    }

    function toggleGraph(id) {
        const el = document.getElementById(id);
        const modalBody = document.querySelector('.modal-body');
        
        // タップした行（基準位置）の座標を記録
        const refEl = el.previousElementSibling;
        let topBefore = refEl ? refEl.getBoundingClientRect().top : 0;

        const isOp = el.classList.contains('open');
        document.querySelectorAll('.sub-graph-row').forEach(r => r.classList.remove('open'));
        if(!isOp) el.classList.add('open');

        // 開閉後のズレをスクロールで補正
        if (refEl) {
            let topAfter = refEl.getBoundingClientRect().top;
            modalBody.scrollTop += (topAfter - topBefore);
        }
    }

    function exportData() {
        const d = new Date();
        const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
        const dat = getData();
        const pm = ALL_PARAMS[data.machine];
        
        let calcG, calcB, calcR;
        if (data.viewMode === 'personal') {
            calcG = Math.max(0, dat.cur.g - dat.start.g);
            calcB = Math.max(0, dat.cur.b - dat.start.b);
            calcR = Math.max(0, dat.cur.r - dat.start.r);
        } else {
            calcG = dat.cur.g;
            calcB = dat.cur.b; calcR = dat.cur.r;
        }
        
        const totalG_out = calcG + (calcB * pm.bigG) + (calcR * pm.regG);
        const bL = [...dat.lamps.big];
        
        let txt = "";
        if (data.machine === 'newking') {
            const regT_out = dat.lamps.regT.slice(0, 4);
            const row = [dateStr, totalG_out, calcG, (calcB*pm.bigG)+(calcR*pm.regG), calcB, calcR, dat.cur.bell, dat.cur.suika, dat.cur.suikaR, ...dat.lamps.regS, ...bL, ...regT_out, dat.cur.retro_d, dat.cur.retro];
            txt = row.join('\t');
        } else {
            const row = [dateStr, totalG_out, calcG, (calcB*pm.bigG)+(calcR*pm.regG), calcB, calcR, dat.cur.bell, dat.cur.suika, ...bL, ...dat.lamps.regS, ...dat.lamps.regT, dat.cur.retro_d, dat.cur.retro];
            txt = row.join('\t');
        }

        navigator.clipboard.writeText(txt).then(() => {
            if (typeof html2canvas === 'undefined') {
                alert("データをコピーしました。"); return;
            }
            if(confirm("データをコピーしました。\n設定推測画像を生成しますか？\n(キャンセルで終了)")) {
                setTimeout(() => generateImage(), 100);
            }
        });
    }

    function generateImage() {
        const pm = ALL_PARAMS[data.machine];
        const w = data.weights[data.machine];
        const w_labels = pm.w_labels;

        document.getElementById('cap-machine').innerText = pm.name;
        calc('cap');
        
        let wHtml = '<p style="margin: 0 0 5px; font-weight: bold;">＜要素調整＞</p><div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px 10px;">';
        const keys = ['b', 'r', 'gas', 'bell', 'sui', 'suiR', 'sl', 'morn', 'bl', 'rl', 'ret'];
        
        keys.forEach(key => {
            if (w[key] !== undefined && w_labels[key]) {
                if (key === 'suiR' && data.machine !== 'newking') return;
                wHtml += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #333;">
                            <span>${w_labels[key]}</span>
                            <span style="font-weight:bold; color:white;">${w[key]}%</span>
                          </div>`;
            }
        });
        wHtml += '</div>';
        document.getElementById('cap-weight-info').innerHTML = wHtml;

        const target = document.getElementById('capture-content');
        const container = document.getElementById('capture-container');
        container.style.visibility = 'visible';
        
        html2canvas(target, { backgroundColor: "#1a1a1a", scale: 4 }).then(canvas => {
            const imgData = canvas.toDataURL("image/png");
            document.getElementById('img-preview').src = imgData;
            document.getElementById('img-modal').style.display = 'flex';
            container.style.visibility = 'hidden';
        }).catch(e => {
            alert("画像の生成に失敗しました。");
            container.style.visibility = 'hidden';
        });
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = `hana_setting_${data.machine}_${Date.now()}.png`;
        link.href = document.getElementById('img-preview').src;
        link.click();
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); if(id==='predict-modal') calc(); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function resetAll() { 
        if(confirm("現在選択中の機種データを全消去しますか？")) { 
            data[data.machine] = JSON.parse(JSON.stringify(SINGLE_DEFAULT));
            save(true); // 裏側でデータを保存
            init();     // 通信を発生させず、内部的に画面を初期化する（爆速化）
            closeModal('setting-modal'); // ついでに設定画面を閉じる
        }
    }

    window.onload = init;
</script>

<div id="capture-container" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; visibility:hidden; overflow:hidden;">
    <div id="capture-content" style="width:400px; background:#1a1a1a; padding:10px 20px 20px; box-sizing:border-box;">
        <h3 style="text-align:center; color:white; border-bottom:1px solid #fff; padding-bottom:10px; font-size:20px;">ハナハナカウンター</h3>
        <p class="section-title" style="color:#ddd">機種: <span id="cap-machine"></span></p>
        <p class="section-title" style="color:#ddd" id="cap-title-predict">＜推測設定＞</p>
        <div id="cap-predict-bars" style="background:#222; padding:5px 10px; border-radius:5px; margin-bottom:10px;"></div>
        <p class="section-title" style="color:#ddd" id="cap-title-expect">＜実践値＞</p>
        <div id="cap-expect-info" class="expect-box"></div>
        <p class="section-title" style="color:#ddd" id="cap-title-detail">＜詳細データ＞</p>
        <table class="detail-table" id="cap-detail-rows"></table>
        <div id="cap-weight-info" style="margin-top:15px; border-top:1px solid #444; padding-top:10px; color:#ddd; font-size:11px;"></div>
    </div>
</div>

</body>
